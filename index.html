<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App</title>
    <style>
        :root { --bg: #313338; --card: #2b2d31; --input: #1e1f22; --blurple: #5865f2; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Центровка входа */
        #authSection { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 8px; width: 100%; max-width: 350px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; border: none; background: var(--input); color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; background: var(--blurple); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        /* Чат */
        #chatSection { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #383a40; padding: 10px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
        .msg.mine { align-self: flex-end; background: var(--blurple); }
        .input-area { padding: 20px; background: var(--bg); display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="authSection">
        <div class="auth-card">
            <h2 style="text-align:center; margin-top:0;">Вход в чат</h2>
            <input type="email" id="email" placeholder="Ваш Email">
            <input type="password" id="password" placeholder="Пароль">
            <button id="loginBtn">Войти</button>
            <p id="regBtn" style="color:#00a8fc; text-align:center; font-size:13px; cursor:pointer; margin-top:15px;">Зарегистрироваться</p>
        </div>
    </div>

    <div id="chatSection">
        <div style="background:#2b2d31; padding:15px; text-align:center; font-weight:bold; border-bottom:1px solid #1e1f22;"># общий-чат</div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Написать сообщение...">
            <button id="sendBtn" style="width:auto; padding:10px 20px;">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCiduYZfuWiAoJOuTuhmdDRbPWlpL1jmw4", 
            authDomain: "telegram-clone-roskamnadzor.firebaseapp.com", 
            projectId: "telegram-clone-роскамнадзор", 
            databaseURL: "https://telegram-clone-roskamnadzor-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const authSec = document.getElementById('authSection');
        const chatSec = document.getElementById('chatSection');
        const msgsDiv = document.getElementById('messages');
        let user = null;

        // Следим за входом
        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                authSec.style.display = 'none';
                chatSec.style.display = 'flex';
                startChat();
            } else {
                authSec.style.display = 'flex';
                chatSec.style.display = 'none';
            }
        });

        // Кнопки
        document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, email.value, password.value).catch(e => alert("Ошибка: " + e.message));
        document.getElementById('regBtn').onclick = () => createUserWithEmailAndPassword(auth, email.value, password.value).catch(e => alert("Ошибка: " + e.message));

        function startChat() {
            onChildAdded(ref(db, 'messages'), (snap) => {
                const data = snap.val();
                const div = document.createElement('div');
                div.className = `msg ${data.email === user.email ? 'mine' : ''}`;
                div.innerHTML = `<div style="font-size:10px; opacity:0.7;">${data.email.split('@')[0]}</div>${data.text}`;
                msgsDiv.appendChild(div);
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
            });
        }

        document.getElementById('sendBtn').onclick = () => {
            if(msgInput.value) {
                push(ref(db, 'messages'), { text: msgInput.value, email: user.email });
                msgInput.value = '';
            }
        };
    </script>
</body>
</html>
