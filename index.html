<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mlyn</title>
    <style>
        :root { --bg: #313338; --card: #2b2d31; --blurple: #5865f2; --text: #f2f3f5; --accent: #00a8fc; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        body { background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* ЭКРАН ВХОДА — ТЕПЕРЬ НА ВЕСЬ ЭКРАН */
        #authSection { 
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
            display: flex; align-items: center; justify-content: center; padding: 20px; 
        }
        .auth-card { background: var(--card); padding: 40px 30px; border-radius: 15px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .logo-big { 
            width: 60px; height: 60px; background: var(--accent); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: 900; font-size: 32px; margin: 0 auto 15px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .google-btn { 
            width: 100%; padding: 14px; background: white; color: #333; border: none; 
            border-radius: 8px; font-weight: bold; margin-top: 25px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 16px;
            transition: 0.2s;
        }
        .google-btn:active { transform: scale(0.98); background: #eee; }

        /* ЧАТ */
        .header { background: var(--card); padding: 15px; border-bottom: 1px solid #1e1f22; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.mine { align-self: flex-end; background: var(--blurple); border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #383a40; border-bottom-left-radius: 2px; }
        .u-name { font-size: 10px; font-weight: bold; margin-bottom: 3px; color: var(--accent); }
        .mine .u-name { color: #fff; text-align: right; }

        .input-area { 
            padding: 15px; background: var(--bg); border-top: 1px solid #2b2d31;
            padding-bottom: calc(env(safe-area-inset-bottom) + 15px);
        }
        .input-row { display: flex; gap: 10px; }
        .in-wrap { flex: 1; background: #383a40; border-radius: 25px; padding: 0 15px; display: flex; align-items: center; }
        input#msgInput { background: transparent; border: none; color: white; flex: 1; height: 45px; outline: none; }
        
        .send-btn { background: var(--blurple); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="authSection">
        <div class="auth-card">
            <div class="logo-big">M</div>
            <h1 style="font-size: 32px; letter-spacing: -1px;">Mlyn</h1>
            <p style="color: var(--muted); margin-top: 5px;">Добро пожаловать в будущее</p>
            
            <button id="googleBtn" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Войти через Google
            </button>
        </div>
    </div>

    <div class="header">
        <div style="font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <div style="width:20px; height:20px; background:var(--accent); border-radius:4px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);"></div>
            Mlyn
        </div>
        <span onclick="auth.signOut()" style="font-size: 12px; opacity: 0.5;">Выйти</span>
    </div>

    <div id="messages"></div>

    <div class="input-area">
        <div class="input-row">
            <div class="in-wrap">
                <input type="text" id="msgInput" placeholder="Сообщение..." autocomplete="off">
            </div>
            <button id="sendBtn" class="send-btn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCiduYZfuWiAoJOuTuhmdDRbPWlpL1jmw4", 
            authDomain: "telegram-clone-roskamnadzor.firebaseapp.com", 
            projectId: "telegram-clone-роскамнадзор", 
            databaseURL: "https://telegram-clone-roskamnadzor-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            document.getElementById('authSection').style.display = user ? 'none' : 'flex';
            if(user) loadMessages();
        });

        document.getElementById('googleBtn').onclick = () => signInWithPopup(auth, provider);

        function loadMessages() {
            const msgsDiv = document.getElementById('messages');
            msgsDiv.innerHTML = '';
            onChildAdded(ref(db, 'messages'), (snap) => {
                const d = snap.val();
                const isMine = d.uid === auth.currentUser.uid;
                const div = document.createElement('div');
                div.className = `msg ${isMine ? 'mine' : 'other'}`;
                div.innerHTML = `<div class="u-name">${d.name}</div>${d.text}`;
                msgsDiv.appendChild(div);
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
            });
        }

        document.getElementById('sendBtn').onclick = () => {
            const val = msgInput.value.trim();
            if(val) {
                push(ref(db, 'messages'), { text: val, name: auth.currentUser.displayName, uid: auth.currentUser.uid, time: serverTimestamp() });
                msgInput.value = '';
            }
        };
        window.auth = auth;
    </script>
</body>
</html>
