<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e1f22">
    <title>Discord Clone</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100dvh;
            background-color: #313338; /* Темный фон Discord сразу */
            color: #f2f3f5;
            overflow: hidden;
            width: 100%;
        }

        /* ЗАПЛАТКА: Эти стили сработают, если Tailwind не загрузится */
        .discord-blurple { background-color: #5865f2 !important; }
        .bg-tertiary { background-color: #1e1f22 !important; }
        
        input {
            background-color: #1e1f22 !important;
            border: none !important;
            color: white !important;
            outline: none !important;
        }

        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0px 1000px #1e1f22 inset !important;
            -webkit-text-fill-color: white !important;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="authScreen" class="w-full max-w-[420px] bg-[#313338] p-8 rounded-lg shadow-2xl">
        <h1 class="text-2xl font-bold text-center mb-2">С возвращением!</h1>
        <p class="text-[#b5bac1] text-center mb-6 text-sm">Мы так рады видеть вас снова!</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold text-[#b5bac1] uppercase mb-2 tracking-wide">Email</label>
                <input type="email" id="email" class="w-full p-3 rounded bg-tertiary">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-[#b5bac1] uppercase mb-2 tracking-wide">Пароль</label>
                <input type="password" id="password" class="w-full p-3 rounded bg-tertiary">
            </div>
            <button id="loginBtn" class="btn-primary discord-blurple text-white hover:bg-[#4752c4]">Вход</button>
            <button id="regBtn" class="w-full text-sm text-[#00a8fc] hover:underline bg-transparent border-none mt-2 cursor-pointer">Зарегистрироваться</button>
        </div>
    </div>

</body>
</html>
