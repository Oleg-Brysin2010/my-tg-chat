<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Pro</title>
    <style>
        :root { 
            --bg: #313338; --card: #2b2d31; --input: #1e1f22; 
            --blurple: #5865f2; --text: #f2f3f5; --muted: #b5bac1; 
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; }

        /* СКРОЛЛБАР */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 10px; }

        /* ВХОД */
        #authSection { display: flex; align-items: center; justify-content: center; flex: 1; padding: 20px; }
        .auth-card { background: var(--card); padding: 32px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        h2 { margin: 0 0 8px; font-size: 24px; }
        label { display: block; color: var(--muted); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-top: 15px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 4px; border: none; background: var(--input); color: white; outline: none; font-size: 16px; }
        input:focus { box-shadow: 0 0 0 2px var(--blurple); }
        
        .btn { width: 100%; padding: 14px; background: var(--blurple); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .btn:active { background: #4752c4; transform: scale(0.98); }

        /* ЧАТ */
        #chatSection { display: none; flex-direction: column; height: 100%; }
        .chat-header { background: var(--card); padding: 15px; font-weight: bold; border-bottom: 1px solid #1e1f22; display: flex; justify-content: space-between; align-items: center; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-container { display: flex; flex-direction: column; max-width: 85%; }
        .msg-container.mine { align-self: flex-end; align-items: flex-end; }
        
        .msg-info { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; font-size: 12px; }
        .username { color: #ffffff; font-weight: bold; }
        .timestamp { color: var(--muted); font-size: 10px; }
        
        .bubble { background: #383a40; padding: 12px; border-radius: 2px 15px 15px 15px; line-height: 1.4; position: relative; }
        .mine .bubble { background: var(--blurple); border-radius: 15px 15px 2px 15px; }

        .input-area { padding: 20px; background: var(--bg); display: flex; gap: 12px; align-items: center; }
        .input-wrapper { background: #383a40; flex: 1; border-radius: 8px; display: flex; align-items: center; padding: 2px 12px; }
        #msgInput { background: transparent; margin: 0; }
    </style>
</head>
<body>

    <div id="authSection">
        <div class="auth-card">
            <h2>Добро пожаловать!</h2>
            <p style="color: var(--muted); margin-bottom: 20px;">Заполни данные для входа</p>
            
            <label>Имя (Никнейм)</label>
            <input type="text" id="nickname" placeholder="Например: Neo">
            
            <label>Email</label>
            <input type="email" id="email" placeholder="email@example.com">
            
            <label>Пароль</label>
            <input type="password" id="password">
            
            <button class="btn" id="loginBtn" style="margin-top:20px;">Войти</button>
            <button id="regBtn" style="background:none; border:none; color:#00a8fc; margin-top:15px; width:100%; cursor:pointer;">Регистрация</button>
        </div>
    </div>

    <div id="chatSection">
        <div class="chat-header">
            <span># основной-чат</span>
            <button id="logoutBtn" style="background:none; border:none; color:var(--muted); cursor:pointer;">Выйти</button>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="msgInput" placeholder="Написать сообщение..." autocomplete="off">
            </div>
            <button id="sendBtn" style="width:auto; padding: 12px 20px;" class="btn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCiduYZfuWiAoJOuTuhmdDRbPWlpL1jmw4", 
            authDomain: "telegram-clone-roskamnadzor.firebaseapp.com", 
            projectId: "telegram-clone-роскамнадзор", 
            databaseURL: "https://telegram-clone-roskamnadzor-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const authSec = document.getElementById('authSection');
        const chatSec = document.getElementById('chatSection');
        const msgsDiv = document.getElementById('messages');
        const nickInput = document.getElementById('nickname');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authSec.style.display = 'none';
                chatSec.style.display = 'flex';
                startChat(user);
            } else {
                authSec.style.display = 'flex';
                chatSec.style.display = 'none';
            }
        });

        // ВХОД
        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, email.value, password.value).catch(e => alert(e.message));
        };

        // РЕГИСТРАЦИЯ + СОХРАНЕНИЕ НИКА
        document.getElementById('regBtn').onclick = async () => {
            if(!nickInput.value) return alert("Введите никнейм!");
            try {
                const res = await createUserWithEmailAndPassword(auth, email.value, password.value);
                await updateProfile(res.user, { displayName: nickInput.value });
                location.reload(); 
            } catch (e) { alert(e.message); }
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        function startChat(user) {
            msgsDiv.innerHTML = "";
            onChildAdded(ref(db, 'chat_messages'), (snap) => {
                const data = snap.val();
                const isMine = data.uid === user.uid;
                
                // Форматируем время
                const date = data.time ? new Date(data.time) : new Date();
                const timeStr = date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0');

                const msgHtml = `
                    <div class="msg-container ${isMine ? 'mine' : ''}">
                        <div class="msg-info">
                            <span class="username">${data.name || 'Аноним'}</span>
                            <span class="timestamp">${timeStr}</span>
                        </div>
                        <div class="bubble">${data.text}</div>
                    </div>
                `;
                msgsDiv.insertAdjacentHTML('beforeend', msgHtml);
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
            });
        }

        const sendMsg = () => {
            if(msgInput.value && auth.currentUser) {
                push(ref(db, 'chat_messages'), {
                    text: msgInput.value,
                    name: auth.currentUser.displayName || auth.currentUser.email.split('@')[0],
                    uid: auth.currentUser.uid,
                    time: serverTimestamp()
                });
                msgInput.value = '';
            }
        };

        document.getElementById('sendBtn').onclick = sendMsg;
        document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
    </script>
</body>
</html>
