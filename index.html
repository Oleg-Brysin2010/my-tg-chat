<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Clone</title>
    <style>
        :root {
            --bg-main: #313338;
            --bg-input: #1e1f22;
            --blurple: #5865f2;
            --text-main: #f2f3f5;
            --text-muted: #b5bac1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-center;
            height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background-color: var(--bg-main);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { font-size: 24px; margin-bottom: 8px; font-weight: bold; }
        p { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; }

        .field { text-align: left; margin-bottom: 20px; }
        label { 
            display: block; 
            color: var(--text-muted); 
            font-size: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
        }

        input {
            width: 100%;
            background-color: var(--bg-input);
            border: none;
            padding: 12px;
            border-radius: 4px;
            color: white;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            background-color: var(--blurple);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }

        .reg-link {
            display: block;
            margin-top: 15px;
            color: #00a8fc;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h1>С возвращением!</h1>
        <p>Мы так рады видеть вас снова!</p>
        
        <div class="field">
            <label>Email</label>
            <input type="email" id="email">
        </div>

        <div class="field">
            <label>Пароль</label>
            <input type="password" id="password">
        </div>

        <button class="login-btn">Вход</button>
        <a href="#" class="reg-link">Зарегистрироваться</a>
    </div>

</body>
</html>
