<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Ultimate</title>
    <style>
        :root { --bg: #313338; --card: #2b2d31; --input: #1e1f22; --blurple: #5865f2; --text: #f2f3f5; --muted: #b5bac1; --danger: #ed4245; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { background: var(--card); padding: 15px; font-weight: bold; border-bottom: 1px solid #1e1f22; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        .msg-container { display: flex; flex-direction: column; max-width: 85%; align-self: flex-start; cursor: pointer; transition: 0.2s; }
        .msg-container.mine { align-self: flex-end; align-items: flex-end; }
        .username { font-size: 11px; font-weight: bold; margin-bottom: 2px; color: #00a8fc; }
        .bubble { background: #383a40; padding: 10px 14px; border-radius: 2px 16px 16px 16px; position: relative; font-size: 15px; }
        .mine .bubble { background: var(--blurple); border-radius: 16px 16px 2px 16px; }
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }

        /* ИНДИКАТОР ПЕЧАТИ */
        #typing { font-size: 12px; color: var(--muted); padding: 0 20px; height: 18px; font-style: italic; }

        /* ПАНЕЛЬ ВВОДА И ЭМОДЗИ */
        .input-area { padding: 10px 15px; background: var(--bg); border-top: 1px solid #2b2d31; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        .input-wrapper { flex: 1; background: #383a40; border-radius: 20px; display: flex; align-items: center; padding: 0 15px; }
        #msgInput { background: transparent; border: none; color: white; padding: 12px 0; outline: none; flex: 1; font-size: 15px; }
        
        .emoji-bar { display: flex; gap: 10px; padding: 8px 0; overflow-x: auto; }
        .emoji-btn { font-size: 20px; cursor: pointer; filter: grayscale(0.3); transition: 0.2s; }
        .emoji-btn:hover { filter: grayscale(0); transform: scale(1.2); }

        #authSection { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 8px; width: 100%; max-width: 380px; text-align: center; }
        .btn { padding: 12px 20px; background: var(--blurple); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="authSection">
        <div class="auth-card">
            <h2>Welcome back!</h2>
            <input type="text" id="nickname" placeholder="Никнейм">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            <button class="btn" id="loginBtn" style="width:100%; margin-top:10px;">Войти</button>
            <button id="regBtn" style="background:none; border:none; color:#00a8fc; margin-top:15px; cursor:pointer;">Регистрация</button>
        </div>
    </div>

    <div class="header">
        <span># main-chat 💬</span>
        <span id="logout" style="opacity:0.5; font-size:12px; cursor:pointer;">Logout</span>
    </div>

    <div id="messages"></div>
    <div id="typing"></div>

    <div class="input-area">
        <div class="emoji-bar">
            <span class="emoji-btn">🔥</span><span class="emoji-btn">😂</span><span class="emoji-btn">❤️</span>
            <span class="emoji-btn">👍</span><span class="emoji-btn">😎</span><span class="emoji-btn">💀</span>
            <span class="emoji-btn">🤨</span><span class="emoji-btn">⚡</span>
        </div>
        <div class="input-row">
            <label style="cursor:pointer; font-size:22px;">📎<input type="file" id="fileInput" accept="image/*" style="display:none;"></label>
            <div class="input-wrapper">
                <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
            </div>
            <button id="sendBtn" class="btn" style="border-radius:50%; width:45px; height:45px; padding:0;">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, set, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCiduYZfuWiAoJOuTuhmdDRbPWlpL1jmw4", 
            authDomain: "telegram-clone-roskamnadzor.firebaseapp.com", 
            projectId: "telegram-clone-роскамнадзор", 
            databaseURL: "https://telegram-clone-roskamnadzor-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const IMGBB_KEY = "b0ae43a6f86ace22817aa2f7b101fa31";

        const msgsDiv = document.getElementById('messages');
        const typingDiv = document.getElementById('typing');
        const msgInput = document.getElementById('msgInput');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authSection').style.display = 'none';
                initChat(user);
            } else {
                document.getElementById('authSection').style.display = 'flex';
            }
        });

        // АВТОРИЗАЦИЯ
        document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, email.value, password.value);
        document.getElementById('regBtn').onclick = async () => {
            const res = await createUserWithEmailAndPassword(auth, email.value, password.value);
            await updateProfile(res.user, { displayName: nickname.value });
            location.reload();
        };
        document.getElementById('logout').onclick = () => signOut(auth);

        function initChat(user) {
            // ТИПАЕТ... (Status)
            msgInput.oninput = () => {
                set(ref(db, `typing/${user.uid}`), msgInput.value.length > 0 ? user.displayName : null);
                setTimeout(() => set(ref(db, `typing/${user.uid}`), null), 3000);
            };

            onValue(ref(db, 'typing'), (snap) => {
                const typers = snap.val() || {};
                const names = Object.values(typers).filter(n => n && n !== user.displayName);
                typingDiv.innerText = names.length ? `${names.join(', ')} печатает...` : '';
            });

            // ЗАГРУЗКА И УДАЛЕНИЕ
            onChildAdded(ref(db, 'messages'), (snap) => {
                const d = snap.val();
                const isMine = d.uid === user.uid;
                const div = document.createElement('div');
                div.id = 'msg-' + snap.key;
                div.className = `msg-container ${isMine ? 'mine' : ''}`;
                div.onclick = () => isMine && confirm("Удалить сообщение?") && remove(ref(db, `messages/${snap.key}`));
                
                let html = `<div class="username">${d.name}</div><div class="bubble">`;
                if(d.text) html += `<div>${d.text}</div>`;
                if(d.image) html += `<img src="${d.image}" class="chat-img">`;
                html += `</div>`;
                div.innerHTML = html;
                msgsDiv.appendChild(div);
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
            });

            onChildRemoved(ref(db, 'messages'), (snap) => {
                document.getElementById('msg-' + snap.key)?.remove();
            });
        }

        // ОТПРАВКА
        const send = (data) => push(ref(db, 'messages'), { ...data, name: auth.currentUser.displayName, uid: auth.currentUser.uid, time: serverTimestamp() });
        
        document.getElementById('sendBtn').onclick = () => { if(msgInput.value) { send({text: msgInput.value}); msgInput.value = ''; } };
        
        document.querySelectorAll('.emoji-btn').forEach(b => b.onclick = () => msgInput.value += b.innerText);

        document.getElementById('fileInput').onchange = async (e) => {
            const f = e.target.files[0];
            if(!f) return;
            typingDiv.innerText = "☁️ Loading image...";
            const fd = new FormData(); fd.append("image", f);
            const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
            const res = await r.json();
            send({image: res.data.url});
            typingDiv.innerText = "";
        };
    </script>
</body>
</html>
