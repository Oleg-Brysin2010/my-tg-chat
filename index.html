<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Clone</title>
    <style>
        :root {
            --bg-main: #313338;
            --bg-input: #1e1f22;
            --blurple: #5865f2;
            --text-main: #f2f3f5;
            --text-muted: #b5bac1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background-color: var(--bg-main);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { font-size: 24px; margin-bottom: 8px; font-weight: bold; }
        p { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; }

        .field { text-align: left; margin-bottom: 20px; }
        label { 
            display: block; 
            color: var(--text-muted); 
            font-size: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
        }

        input {
            width: 100%;
            background-color: var(--bg-input);
            border: none;
            padding: 12px;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus { box-shadow: 0 0 0 2px var(--blurple); }

        .login-btn {
            width: 100%;
            background-color: var(--blurple);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:active { background-color: #4752c4; }

        .reg-link {
            display: block;
            margin-top: 15px;
            color: #00a8fc;
            text-decoration: none;
            font-size: 14px;
            background: none;
            border: none;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h1>С возвращением!</h1>
        <p>Мы так рады видеть вас снова!</p>
        
        <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="email@example.com">
        </div>

        <div class="field">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="Минимум 6 символов">
        </div>

        <button id="loginBtn" class="login-btn">Вход</button>
        <button id="regBtn" class="reg-link">Зарегистрироваться</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Твой конфиг, который ты прислал
        const firebaseConfig = { 
            apiKey: "AIzaSyCiduYZfuWiAoJOuTuhmdDRbPWlpL1jmw4", 
            authDomain: "telegram-clone-roskamnadzor.firebaseapp.com", 
            projectId: "telegram-clone-роскамнадзор", 
            storageBucket: "telegram-clone-roskamnadzor.firebasestorage.app", 
            messagingSenderId: "935106885464", 
            appId: "1:935106885464:web:308629db74f952bea3172d", 
            measurementId: "G-S4SM6LWZZQ" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const regBtn = document.getElementById('regBtn');

        // Вход
        loginBtn.onclick = async () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            if(!email || !password) return alert("Заполни все поля!");
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                alert("Успешный вход!");
            } catch (e) {
                alert("Ошибка: " + e.message);
            }
        };

        // Регистрация
        regBtn.onclick = async () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            if(!email || !password) return alert("Заполни все поля!");

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                alert("Аккаунт создан!");
            } catch (e) {
                alert("Ошибка: " + e.message);
            }
        };
    </script>
</body>
</html>
