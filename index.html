<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mlyn</title>
    <style>
        :root { --bg: #313338; --card: #2b2d31; --blurple: #5865f2; --text: #f2f3f5; --accent: #00a8fc; --muted: #949ba4; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* AUTH */
        #authSection { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 40px 30px; border-radius: 15px; width: 100%; max-width: 360px; text-align: center; }
        .google-btn { width: 100%; padding: 14px; background: white; color: #333; border: none; border-radius: 8px; font-weight: bold; margin-top: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }

        /* CHAT */
        .header { background: var(--card); padding: 15px; border-bottom: 1px solid #1e1f22; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-row { display: flex; gap: 10px; max-width: 85%; }
        .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: #444; flex-shrink: 0; object-fit: cover; }
        
        .bubble-wrap { display: flex; flex-direction: column; gap: 2px; }
        .mine { align-items: flex-end; }

        .msg { padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-wrap: break-word; background: #383a40; }
        .mine .msg { background: var(--blurple); color: white; }
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }
        
        .u-info { font-size: 11px; font-weight: bold; color: var(--accent); margin-bottom: 2px; display: flex; gap: 8px; align-items: center; }
        .mine .u-info { flex-direction: row-reverse; }
        .time { font-weight: normal; color: var(--muted); font-size: 10px; }

        /* НИЖНЯЯ ПАНЕЛЬ — ТЕПЕРЬ СО СКРЕПКОЙ */
        .input-area { 
            padding: 10px 15px; 
            background: var(--bg); 
            border-top: 1px solid #2b2d31; 
            padding-bottom: calc(env(safe-area-inset-bottom) + 10px); 
        }
        .input-row { display: flex; gap: 10px; align-items: center; }
        
        /* Кнопка скрепки */
        .attach-btn {
            width: 40px; height: 40px; background: #383a40; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; transition: 0.2s; color: var(--accent);
        }
        .attach-btn:active { transform: scale(0.9); background: #444; }

        .in-wrap { flex: 1; background: #383a40; border-radius: 20px; padding: 0 15px; display: flex; align-items: center; height: 40px; }
        input#msgInput { background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 16px; }
        
        .send-btn { 
            background: var(--blurple); border: none; width: 40px; height: 40px; 
            border-radius: 50%; color: white; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-size: 18px; 
        }
    </style>
</head>
<body>

    <div id="authSection">
        <div class="auth-card">
            <h1 style="font-size: 32px; margin-bottom: 10px;">Mlyn</h1>
            <button id="googleBtn" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Войти через Google
            </button>
        </div>
    </div>

    <div class="header">
        <div style="font-weight: bold;">Mlyn 🌾</div>
        <span onclick="auth.signOut()" style="font-size: 12px; opacity: 0.5; cursor: pointer;">Выйти</span>
    </div>

    <div id="messages"></div>

    <div class="input-area">
        <div id="status" style="font-size: 10px; color: var(--accent); margin-bottom: 5px; height: 12px;"></div>
        <div class="input-row">
            <label class="attach-btn" title="Прикрепить фото">
                📎
                <input type="file" id="fileInput" accept="image/*" style="display:none;">
            </label>
            
            <div class="in-wrap">
                <input type="text" id="msgInput" placeholder="Сообщение..." autocomplete="off">
            </div>
            
            <button id="sendBtn" class="send-btn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCiduYZfuWiAoJOuTuhmdDRbPWlpL1jmw4", 
            authDomain: "telegram-clone-roskamnadzor.firebaseapp.com", 
            projectId: "telegram-clone-роскамнадзор", 
            databaseURL: "https://telegram-clone-roskamnadzor-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();
        const IMGBB_KEY = "b0ae43a6f86ace22817aa2f7b101fa31";

        const msgsDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msgInput');
        const statusDiv = document.getElementById('status');

        onAuthStateChanged(auth, (user) => {
            document.getElementById('authSection').style.display = user ? 'none' : 'flex';
            if(user) loadMessages();
        });

        document.getElementById('googleBtn').onclick = () => signInWithPopup(auth, provider);

        function loadMessages() {
            msgsDiv.innerHTML = '';
            onChildAdded(ref(db, 'messages'), (snap) => {
                const d = snap.val();
                const isMine = d.uid === auth.currentUser.uid;
                const time = d.time ? new Date(d.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                
                const div = document.createElement('div');
                div.id = 'msg-' + snap.key;
                div.className = `msg-row ${isMine ? 'mine' : ''}`;
                if(isMine) div.onclick = () => confirm("Удалить сообщение?") && remove(ref(db, `messages/${snap.key}`));
                
                div.innerHTML = `
                    <img src="${d.photo || 'https://via.placeholder.com/40'}" class="avatar">
                    <div class="bubble-wrap">
                        <div class="u-info">${d.name} <span class="time">${time}</span></div>
                        <div class="msg">
                            ${d.text ? `<div>${d.text}</div>` : ''}
                            ${d.image ? `<img src="${d.image}" class="chat-img">` : ''}
                        </div>
                    </div>
                `;
                msgsDiv.appendChild(div);
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
            });
            onChildRemoved(ref(db, 'messages'), (snap) => document.getElementById('msg-' + snap.key)?.remove());
        }

        const sendMessage = (data) => {
            push(ref(db, 'messages'), { 
                ...data,
                name: auth.currentUser.displayName, 
                photo: auth.currentUser.photoURL,
                uid: auth.currentUser.uid, 
                time: serverTimestamp() 
            });
        };

        document.getElementById('sendBtn').onclick = () => {
            const val = msgInput.value.trim();
            if(val) {
                sendMessage({ text: val });
                msgInput.value = '';
            }
        };

        msgInput.onkeypress = (e) => e.key === 'Enter' && document.getElementById('sendBtn').click();

        document.getElementById('fileInput').onchange = async (e) => {
            const f = e.target.files[0]; if(!f) return;
            statusDiv.innerText = "☁️ Загрузка фото...";
            const fd = new FormData(); fd.append("image", f);
            try {
                const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
                const res = await r.json();
                if(res.success) sendMessage({ image: res.data.url });
            } catch(err) { alert("Ошибка загрузки"); }
            statusDiv.innerText = "";
            e.target.value = '';
        };

        window.auth = auth;
    </script>
</body>
</html>
