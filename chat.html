<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Chat</title>
    <style>
        body { margin: 0; background: #313338; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #2b2d31; padding: 15px; font-weight: bold; border-bottom: 1px solid #1e1f22; text-align: center; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #383a40; padding: 10px; border-radius: 8px; max-width: 80%; align-self: flex-start; }
        .msg.mine { align-self: flex-end; background: #5865f2; }
        .user { color: #00a8fc; font-size: 11px; font-weight: bold; margin-bottom: 4px; }
        .input-area { background: #313338; padding: 15px; }
        .input-wrapper { background: #383a40; border-radius: 8px; display: flex; padding: 10px; }
        input { background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 16px; }
        button { background: #5865f2; border: none; color: white; padding: 8px 15px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header"># общий-чат</div>
    <div class="messages" id="messages">
        </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="msgInput" placeholder="Написать сообщение...">
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ТВОЙ КОНФИГ (Я добавил databaseURL)
        const firebaseConfig = { 
            apiKey: "AIzaSyCiduYZfuWiAoJOuTuhmdDRbPWlpL1jmw4", 
            authDomain: "telegram-clone-roskamnadzor.firebaseapp.com", 
            projectId: "telegram-clone-роскамнадзор", 
            storageBucket: "telegram-clone-roskamnadzor.firebasestorage.app", 
            messagingSenderId: "935106885464", 
            appId: "1:935106885464:web:308629db74f952bea3172d",
            databaseURL: "https://telegram-clone-roskamnadzor-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        let userEmail = "";

        // Проверяем авторизацию
        onAuthStateChanged(auth, (user) => {
            if (user) {
                userEmail = user.email;
            } else {
                window.location.href = "index.html"; 
            }
        });

        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('msgInput');
        const messagesDiv = document.getElementById('messages');

        // Отправка
        sendBtn.onclick = () => {
            if(!msgInput.value) return;
            push(ref(db, 'chat_messages'), {
                text: msgInput.value,
                email: userEmail
            });
            msgInput.value = '';
        };

        // Слушаем базу
        onChildAdded(ref(db, 'chat_messages'), (snapshot) => {
            const data = snapshot.val();
            const isMine = data.email === userEmail;
            const div = document.createElement('div');
            div.className = `msg ${isMine ? 'mine' : ''}`;
            div.innerHTML = `<div class="user">${data.email.split('@')[0]}</div><div>${data.text}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    </script>
</body>
</html>
