<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Chat</title>
    <style>
        :root {
            --bg-dark: #313338;
            --bg-sidebar: #2b2d31;
            --bg-input: #383a40;
            --blurple: #5865f2;
            --text-main: #f2f3f5;
            --text-muted: #b5bac1;
        }

        body { margin: 0; background: var(--bg-dark); color: var(--text-main); font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        .header { background: var(--bg-sidebar); padding: 15px; font-weight: bold; border-bottom: 1px solid #1e1f22; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { background: var(--bg-input); padding: 12px; border-radius: 8px; max-width: 85%; align-self: flex-start; animation: fadeIn 0.3s ease; }
        .msg.mine { align-self: flex-end; background: var(--blurple); }
        
        .msg .user { color: #00a8fc; font-size: 11px; font-weight: bold; margin-bottom: 4px; text-transform: lowercase; }
        .msg.mine .user { color: #ffffff; opacity: 0.8; }
        .msg .text { font-size: 15px; line-height: 1.4; word-break: break-word; }

        .input-area { background: var(--bg-dark); padding: 15px; padding-bottom: 30px; }
        .input-wrapper { background: var(--bg-input); border-radius: 8px; display: flex; padding: 8px 12px; align-items: center; }
        
        input { background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 16px; padding: 8px; }
        button { background: var(--blurple); border: none; color: white; padding: 10px 18px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header"># общий-чат</div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="msgInput" placeholder="Написать в #общий-чат" autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ТВОЙ КОНФИГ
        const firebaseConfig = { 
            apiKey: "AIzaSyCiduYZfuWiAoJOuTuhmdDRbPWlpL1jmw4", 
            authDomain: "telegram-clone-roskamnadzor.firebaseapp.com", 
            projectId: "telegram-clone-роскамнадзор", 
            storageBucket: "telegram-clone-roskamnadzor.firebasestorage.app", 
            messagingSenderId: "935106885464", 
            appId: "1:935106885464:web:308629db74f952bea3172d",
            databaseURL: "https://telegram-clone-roskamnadzor-default-rtdb.firebaseio.com/" // Добавь это, если база не заведется
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        let currentUser = null;

        // Проверяем, кто залогинился
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
            } else {
                window.location.href = "index.html"; // Если не залогинен — выкидываем
            }
        });

        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('msgInput');
        const messagesDiv = document.getElementById('messages');

        // ОТПРАВКА В БАЗУ
        const sendMessage = () => {
            if(!msgInput.value || !currentUser) return;
            
            push(ref(db, 'messages'), {
                text: msgInput.value,
                email: currentUser.email,
                timestamp: Date.now()
            });
            
            msgInput.value = '';
        };

        sendBtn.onclick = sendMessage;
        msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        // ПОЛУЧЕНИЕ ИЗ БАЗЫ В РЕАЛЬНОМ ВРЕМЕНИ
        onChildAdded(ref(db, 'messages'), (snapshot) => {
            const data = snapshot.val();
            const isMine = data.email === currentUser?.email;
            
            const msgHtml = `
                <div class="msg ${isMine ? 'mine' : ''}">
                    <div class="user">${data.email.split('@')[0]}</div>
                    <div class="text">${data.text}</div>
                </div>
            `;
            
            messagesDiv.insertAdjacentHTML('beforeend', msgHtml);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    </script>
</body>
</html>
