<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат</title>
    <style>
        body { margin: 0; background: #313338; color: white; font-family: sans-serif; }
        .header { background: #2b2d31; padding: 15px; text-align: center; border-bottom: 1px solid #1e1f22; }
        #messages { height: 70vh; overflow-y: auto; padding: 20px; }
        .input-box { padding: 20px; display: flex; gap: 10px; background: #313338; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        input { flex: 1; padding: 10px; border-radius: 4px; border: none; background: #383a40; color: white; }
        button { padding: 10px 20px; background: #5865f2; border: none; color: white; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">Общий чат</div>
    <div id="messages">Чат загружается...</div>
    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Сообщение...">
        <button id="sendBtn">Отправить</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyCiduYZfuWiAoJOuTuhmdDRbPWlpL1jmw4", 
            authDomain: "telegram-clone-roskamnadzor.firebaseapp.com", 
            projectId: "telegram-clone-роскамнадзор", 
            databaseURL: "https://telegram-clone-roskamnadzor-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const msgsDiv = document.getElementById('messages');

        // Упростим для теста: уберем проверку Auth, чтобы точно увидеть экран
        onChildAdded(ref(db, 'messages'), (snap) => {
            if (msgsDiv.innerText === "Чат загружается...") msgsDiv.innerText = "";
            const data = snap.val();
            msgsDiv.innerHTML += `<div><b>Гость:</b> ${data.text}</div>`;
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        });

        document.getElementById('sendBtn').onclick = () => {
            const text = document.getElementById('msgInput').value;
            if(text) {
                push(ref(db, 'messages'), { text: text });
                document.getElementById('msgInput').value = '';
            }
        };
    </script>
</body>
</html>
